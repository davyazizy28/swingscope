name: Update SwingScope data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swingscope-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build data.json
        run: python build.py
      - name: Commit if changed
        run: |
          git config user.name  "swingscope-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --quiet --staged || git commit -m "data: $(date -u +%FT%TZ)"
          git push
